<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - AI ChatX 实战派</title>
    <meta name="description" content="{{description}}">
    <link rel="canonical" href="{{canonical_url}}">
    <link rel="icon" href="../favicon.svg">
    <link rel="stylesheet" href="../assets/vendor/fontawesome/css/all.min.css">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2259331322940741" crossorigin="anonymous"></script>

    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155; --text: #f1f5f9; --text-muted: #94a3b8; --border: #334155; }
        [data-theme="light"] { --bg: #ffffff; --bg-card: #f8fafc; --bg-hover: #e2e8f0; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); font-weight: 700; font-size: 20px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        article { padding: 60px 0; }
        h1 { font-size: 32px; margin-bottom: 16px; line-height: 1.3; }
        .meta { color: var(--text-muted); font-size: 14px; margin-bottom: 40px; }
        h2 { font-size: 24px; margin-top: 40px; margin-bottom: 20px; color: var(--text); border-left: 4px solid var(--primary); padding-left: 15px; }
        h3 { font-size: 20px; margin-top: 30px; margin-bottom: 15px; color: var(--text); }
        p { margin-bottom: 20px; color: var(--text-muted); font-size: 16px; }
        ul, ol { margin-bottom: 20px; color: var(--text-muted); padding-left: 20px; }
        li { margin-bottom: 10px; }
        .highlight { background: var(--bg-hover); padding: 2px 5px; border-radius: 4px; color: var(--text); }
        .quote { border-left: 4px solid var(--secondary); padding: 10px 20px; background: var(--bg-card); font-style: italic; margin: 20px 0; }
        footer { background: var(--bg-card); border-top: 1px solid var(--border); padding: 40px 0; margin-top: 60px; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">
                    <div class="logo-icon">🤖</div>
                    <span>AI ChatX</span>
                </a>
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">
                    <i class="fas fa-arrow-left"></i> 返回博客
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <article>
            <h1>{{title}}</h1>
            <div class="meta">
                <span>发布于 {{date}}</span> • <span>分类：{{category}}</span> • <span>阅读：约 {{read_time}} 分钟</span>
            </div>

            {{content}}
        </article>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 AI ChatX. All Rights Reserved. 国内可直连的 AI 工具聚合平台</p>
        </div>
    </footer>
</body>
</html>
